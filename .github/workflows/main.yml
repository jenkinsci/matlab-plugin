name: using mpm to install MATLAB
on: push
jobs:
  run-tests-job:
    strategy:
      matrix:
        os: [ubuntu-latest]
    name: Run System tests
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Setup MATLAB
        id: setup-matlab
        uses: matlab-actions/setup-matlab@v2
        with:
          products: >
            Simulink
            Simulink_Test
            Simulink_Coverage

      - name: Running tests
        run: mvn --batch-mode mvn -Dtest=RunMATLABTestsArtifactsIT#verifyCustomFilePathInputForArtifacts test
        env:
          MATLAB_ROOT: ${{ steps.setup-matlab.outputs.matlabroot }}
          MLM_LICENSE_TOKEN:  ${{ secrets.MLM_LICENSE_TOKEN}}
