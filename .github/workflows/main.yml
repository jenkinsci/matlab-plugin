name: Running system tests
on: push
jobs:
  my-job:
    name: Run System tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v2

      - name: MATLAB
        id: setup-matlab
        uses: matlab-actions/setup-matlab@v2
        
      - name: Run the tests
        run: mvn -Dtest=RunMATLABCommandIT test -DMATLAB_ROOT=${{ steps.setup-matlab.outputs.matlabroot }}